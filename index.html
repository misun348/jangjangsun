<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titan Rose - Digital HP HUD Update</title>
    <style>
        body { margin: 0; overflow: hidden; background: #60a5fa; font-family: 'Segoe UI', sans-serif; }
        #canvas-container { width: 100%; height: 100vh; cursor: crosshair; }
        
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; color: #fff; }
        
        #boss-ui { position: absolute; top: 30px; left: 50%; transform: translateX(-50%); text-align: center; width: 60%; }
        #boss-name { font-size: 22px; font-weight: 900; color: #ff0044; text-shadow: 0 0 10px #fff, 0 0 15px #ff0044; margin-bottom: 5px; letter-spacing: 2px; }
        #boss-pattern-text { font-size: 13px; color: #facc15; font-weight: bold; margin-bottom: 3px; text-shadow: 1px 1px 2px #000; }
        #boss-hp-text { font-size: 14px; color: #330011; font-weight: bold; margin-bottom: 5px; text-shadow: 1px 1px 1px rgba(255,255,255,0.6); }
        #boss-hp-bar-outer { width: 100%; height: 18px; background: rgba(255,255,255,0.4); border: 2px solid #ff0044; border-radius: 4px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        #boss-hp-bar-inner { width: 100%; height: 100%; background: linear-gradient(90deg, #ff0044, #ff6600); width: 100%; }

        #flight-hud { position: absolute; top: 40px; left: 40px; font-family: monospace; font-size: 14px; color: #111827; line-height: 1.5; font-weight: bold; text-shadow: 1px 1px 0px rgba(255,255,255,0.8); }

        /* 플레이어 UI 레이아웃 확장 및 디지털 텍스트 스타일 추가 */
        #player-ui { position: absolute; bottom: 40px; left: 40px; width: 250px; }
        .hud-title { font-size: 12px; font-weight: bold; color: #b91c1c; margin-bottom: 4px; letter-spacing: 1px; text-shadow: 1px 1px 0px rgba(255,255,255,0.5); }
        .hud-bar-outer { width: 100%; height: 12px; background: rgba(255,255,255,0.5); border: 1px solid #b91c1c; border-radius: 2px; overflow: hidden; }
        #player-hp-bar { width: 100%; height: 100%; background: #b91c1c; transition: width 0.05s linear; }
        #player-hp-digital { font-family: monospace; font-size: 13px; font-weight: bold; color: #b91c1c; margin-top: 5px; text-shadow: 1px 1px 0px rgba(255,255,255,0.8); letter-spacing: 0.5px; }

        #bottom-ui { position: absolute; bottom: 40px; right: 40px; display: flex; flex-direction: column; align-items: flex-end; gap: 15px; }
        #boost-container { width: 200px; }
        #boost-text { font-size: 11px; font-weight: bold; color: #0369a1; margin-bottom: 4px; text-shadow: 1px 1px 0px rgba(255,255,255,0.5); }
        #boost-bar-outer { width: 100%; height: 8px; background: rgba(255,255,255,0.5); border: 1px solid #0369a1; }
        #boost-bar-inner { width: 100%; height: 100%; background: #0284c7; }

        .skill-slots { display: flex; gap: 15px; }
        .skill-slot {
            width: 75px; height: 75px; background: rgba(255, 255, 255, 0.8); border: 2px solid #b91c1c; border-radius: 6px;
            position: relative; display: flex; flex-direction: column; justify-content: center; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .skill-slot.nuke { border-color: #ea580c; }
        .skill-icon { font-size: 26px; }
        .skill-name { font-size: 9px; font-weight: bold; color: #374151; }
        .cooldown-overlay { position: absolute; bottom: 0; left: 0; width: 100%; height: 0%; background: rgba(0, 0, 0, 0.4); }
        .skill-key { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: #b91c1c; color: #fff; padding: 2px 6px; font-size: 9px; font-weight: bold; border-radius: 3px; }
        .skill-key.nuke-key { background: #ea580c; color: #fff; }
        .slot-timer { position: absolute; font-weight: bold; font-size: 18px; z-index: 2; }
        #missile-timer { color: #b91c1c; }
        #nuke-timer { color: #ea580c; }

        #lockon-hud { position: absolute; top: 58%; left: 50%; transform: translate(-50%, -50%); color: #b91c1c; font-size: 13px; font-weight: bold; text-shadow: 0 0 4px #fff; opacity: 0.9; text-align: center; }

        #mouse-aimer { position: absolute; width: 24px; height: 24px; border: 2px solid #1e3a8a; border-radius: 50%; pointer-events: none; transform: translate(-50%, -50%); top: 50%; left: 50%; box-shadow: 0 0 6px rgba(255,255,255,0.8); }
        #center-cross { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 35px; height: 35px; pointer-events: none; }
        #center-cross::before, #center-cross::after { content: ''; position: absolute; background: rgba(30, 58, 138, 0.5); }
        #center-cross::before { top: 50%; left: 0; width: 100%; height: 2px; }
        #center-cross::after { left: 50%; top: 0; width: 2px; height: 100%; }

        #damage-mask { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(239,68,68,0.4); opacity: 0; pointer-events: none; transition: opacity 0.1s; }
        #flash-bang { position: absolute; top:0; left:0; width:100%; height:100%; background: #fff; opacity: 0; pointer-events: none; }
        #speed-tunnel { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; box-shadow: inset 0 0 0px rgba(255, 255, 255, 0); }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>
    <div id="speed-tunnel"></div>
    <div id="flash-bang"></div>
    <div id="damage-mask"></div>

    <div id="ui-layer">
        <div id="boss-ui">
            <div id="boss-name">초거대 공중 성채 [TITAN-ROSE]</div>
            <div id="boss-pattern-text">상태: 대기 중</div>
            <div id="boss-hp-text">HP: 5000 / 5000</div>
            <div id="boss-hp-bar-outer"><div id="boss-hp-bar-inner"></div></div>
        </div>

        <div id="flight-hud">
            SPD: <span id="hud-spd">245</span> km/h<br>
            THR: <span id="hud-thr">100</span>%<br>
            WPN: READY
        </div>

        <div id="lockon-hud">AIM AT TARGET TO LOCK-ON</div>

        <div id="player-ui">
            <div class="hud-title" id="player-integrity-text">AIRFRAME INTEGRITY</div>
            <div class="hud-bar-outer"><div id="player-hp-bar"></div></div>
            <div id="player-hp-digital">HP: 100 / 100 (100.0%)</div>
        </div>

        <div id="bottom-ui">
            <div id="boost-container">
                <div id="boost-text">WEP AFTERBURNER (SHIFT)</div>
                <div id="boost-bar-outer"><div id="boost-bar-inner"></div></div>
            </div>
            <div class="skill-slots">
                <div class="skill-slot">
                    <div class="skill-key" style="background:#2563eb;">L-CLICK</div>
                    <span class="skill-icon">💥</span>
                    <div class="skill-name">20mm CANNON</div>
                </div>
                <div class="skill-slot missile-slot">
                    <div class="skill-key">F</div>
                    <span class="skill-icon">🚀</span>
                    <div class="skill-name">FAT MISSILE</div>
                    <div id="missile-timer" class="slot-timer"></div>
                    <div class="cooldown-overlay" id="missile-cooldown"></div>
                </div>
                <div class="skill-slot nuke">
                    <div class="skill-key nuke-key">X</div>
                    <span class="skill-icon">☢️</span>
                    <div class="skill-name" style="color:#ea580c;">HEAVY NUKE</div>
                    <div id="nuke-timer" class="slot-timer"></div>
                    <div class="cooldown-overlay" id="nuke-cooldown"></div>
                </div>
            </div>
        </div>
        
        <div id="center-cross"></div>
        <div id="mouse-aimer"></div>
    </div>

    <script>
        // --- 1. 기본 씬 세팅 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x93c5fd); 
        scene.fog = new THREE.FogExp2(0xdbeafe, 0.0003); 

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 1, 6000);
        
        const flightRig = new THREE.Group(); 
        const cameraContainer = new THREE.Group();
        
        cameraContainer.position.set(0, 35, 130); 
        flightRig.add(cameraContainer);
        cameraContainer.add(camera);
        scene.add(flightRig);

        // 기관포 배치
        const gunBarrelMat = new THREE.MeshStandardMaterial({ color: 0x1f2937, metalness: 0.8, roughness: 0.3 });
        const leftBarrel = new THREE.Mesh(new THREE.CylinderGeometry(1.2, 1.4, 15, 8), gunBarrelMat);
        leftBarrel.rotateX(Math.PI / 2); leftBarrel.position.set(-32, 32, 90); flightRig.add(leftBarrel);

        const rightBarrel = new THREE.Mesh(new THREE.CylinderGeometry(1.2, 1.4, 15, 8), gunBarrelMat);
        rightBarrel.rotateX(Math.PI / 2); rightBarrel.position.set(32, 32, 90); flightRig.add(rightBarrel);

        // HUD 고정밀 레이더 내비게이션 화살표 메쉬 설계
        const radarArrowGroup = new THREE.Group();
        const arrowCoreGeo = new THREE.ConeGeometry(3.5, 14, 4);
        const arrowFinGeo = new THREE.BoxGeometry(8, 1, 4);
        const arrowMat = new THREE.MeshBasicMaterial({ color: 0xfacc15, depthTest: false, transparent: true, opacity: 0.95 });
        
        const arrowCoreMesh = new THREE.Mesh(arrowCoreGeo, arrowMat);
        arrowCoreMesh.rotateX(Math.PI / 2);
        const arrowFinMesh = new THREE.Mesh(arrowFinGeo, arrowMat);
        arrowFinMesh.position.set(0, 0, 4);
        
        radarArrowGroup.add(arrowCoreMesh);
        radarArrowGroup.add(arrowFinMesh);
        radarArrowGroup.position.set(0, 24, 65); 
        flightRig.add(radarArrowGroup);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const sunLight = new THREE.DirectionalLight(0xfffbeb, 1.5); sunLight.position.set(1000, 2000, 1000); scene.add(sunLight);

        // --- 2. 게임 상태 정보 정의 ---
        let playerHp = 100;
        let playerMaxHp = 100;
        let isRivalPhase = false; 

        const BASE_SPEED = 2.1;   
        const BOOST_SPEED = 4.2;  
        let speed = BASE_SPEED;
        
        const mouseTargetVisual = new THREE.Object3D(); scene.add(mouseTargetVisual);
        let mouseNDC_X = 0, mouseNDC_Y = 0;

        window.addEventListener('mousemove', (e) => {
            mouseNDC_X = (e.clientX / window.innerWidth) * 2 - 1;
            mouseNDC_Y = -(e.clientY / window.innerHeight) * 2 + 1;
            const aimerUI = document.getElementById('mouse-aimer');
            aimerUI.style.left = e.clientX + 'px'; aimerUI.style.top = e.clientY + 'px';
        });

        const keys = { shift: false, clickHold: false };
        window.addEventListener('keydown', (e) => {
            if(e.key.toLowerCase() === 'f') fireHyperMissile(true); 
            if(e.key.toLowerCase() === 'x') fireTacticalNuke(true);    
            if(e.key === 'Shift') keys.shift = true;
        });
        window.addEventListener('keyup', (e) => { if(e.key === 'Shift') keys.shift = false; });
        window.addEventListener('mousedown', (e) => { if(e.button === 0) keys.clickHold = true; });
        window.addEventListener('mouseup', (e) => { if(e.button === 0) keys.clickHold = false; });

        let boostEnergy = 5.0, maxBoost = 5.0;
        let missileCooldown = false; const MISSILE_TIME = 3.0; 
        let nukeCooldown = false; const NUKE_TIME = 20;

        let playerGunSideToggle = true; let rivalGunSideToggle = true;
        const missiles = []; const bullets = []; const particles = []; const bossProjectiles = []; 
        
        let boss = null; let rival = null; 
        let shakeIntensity = 0, shakeDecay = 0.92, shakeTimer = 0;

        function createClouds() {
            const cloudGeo = new THREE.SphereGeometry(40, 7, 7);
            const cloudMat = new THREE.MeshLambertMaterial({ color: 0xffffff, transparent: true, opacity: 0.85 });
            for(let i=0; i<60; i++) {
                const g = new THREE.Group();
                const parts = 3 + Math.floor(Math.random()*4);
                for(let j=0; j<parts; j++) {
                    const m = new THREE.Mesh(cloudGeo, cloudMat); m.position.set(j*30, (Math.random()-0.5)*15, (Math.random()-0.5)*15); g.add(m);
                }
                g.position.set((Math.random()-0.5)*4000, 100 + Math.random()*500, (Math.random()-0.5)*4000); scene.add(g);
            }
        }
        createClouds();

        // --- 3. 거대 장미 보스 생성 ---
        function spawnBoss() {
            const group = new THREE.Group();
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0x374151, metalness: 0.7, roughness: 0.2 });
            
            const core = new THREE.Mesh(new THREE.SphereGeometry(320, 32, 32), bodyMat);
            core.scale.set(1.5, 0.4, 1.5); group.add(core);

            const petalMat = new THREE.MeshStandardMaterial({ color: 0xdc2626, metalness: 0.1, roughness: 0.5 });
            for(let i=0; i<12; i++) {
                const petal = new THREE.Mesh(new THREE.SphereGeometry(240, 16, 16), petalMat);
                petal.scale.set(1, 1.8, 0.2); petal.position.set(Math.cos(i)*220, 40, Math.sin(i)*220);
                petal.lookAt(group.position); petal.rotateX(Math.PI/2 + 0.3); group.add(petal);
            }
            group.position.set(0, 400, -1500);
            group.userData = { 
                hp: 5000, maxHp: 5000,
                patternTimer: 0, currentPattern: 0, actionTimer: 0,
                dashVelocity: new THREE.Vector3(), velocity: new THREE.Vector3() 
            };
            scene.add(group); boss = group;
        }
        spawnBoss();

        // --- 4. 라이벌 에이스 전투기 스폰 ---
        function spawnRivalAce() {
            const group = new THREE.Group();
            const aceMat = new THREE.MeshStandardMaterial({ color: 0x1e293b, metalness: 0.8, roughness: 0.2 });
            
            const body = new THREE.Mesh(new THREE.ConeGeometry(12, 45, 4), aceMat); body.rotateX(Math.PI/2); group.add(body);
            const wing = new THREE.Mesh(new THREE.BoxGeometry(60, 1.5, 12), aceMat); wing.position.set(0, -1, 3); group.add(wing);

            const wingGlowLeft = new THREE.Mesh(new THREE.BoxGeometry(6, 4, 4), new THREE.MeshBasicMaterial({ color: 0xff0000 }));
            wingGlowLeft.position.set(-30, -1, 3); group.add(wingGlowLeft); 

            const wingGlowRight = new THREE.Mesh(new THREE.BoxGeometry(6, 4, 4), new THREE.MeshBasicMaterial({ color: 0xff0000 }));
            wingGlowRight.position.set(30, -1, 3); group.add(wingGlowRight); 

            group.position.set(0, 400, -1200); 
            group.userData = { hp: 10000, maxHp: 10000, lastGun: 0, lastMissile: 0, lastNuke: 0 };
            scene.add(group); rival = group;

            isRivalPhase = true;
            playerMaxHp = 10000;
            playerHp = 10000; 

            document.getElementById('player-integrity-text').innerText = "RIVAL DUEL INTEGRITY";
            document.getElementById('boss-name').innerText = "⚔️ INFINITE DOGFIGHT: RIVAL ACE ⚔️";
            document.getElementById('boss-name').style.color = "#ea580c";
            document.getElementById('boss-pattern-text').innerText = "상태: 영원한 대결 (HP 10,000 모드 가동)";
        }

        function checkLockOnAvailable(target) {
            if(!target) return false;
            const forwardDir = new THREE.Vector3(0, 0, -1).applyQuaternion(flightRig.quaternion).normalize();
            const toTargetDir = new THREE.Vector3().subVectors(target.position, flightRig.position).normalize();
            return forwardDir.dot(toTargetDir) > 0.94;
        }

        // --- 5. 무기 시스템 연산 ---
        function fireHyperMissile(isPlayerOwned) {
            if(isPlayerOwned && missileCooldown) return; 
            const origin = isPlayerOwned ? flightRig : rival; if(!origin) return;
            if(isPlayerOwned) missileCooldown = true;

            const group = new THREE.Group();
            const neonMat = new THREE.MeshBasicMaterial({ color: isPlayerOwned ? 0xff0055 : 0xffff00 }); 
            const body = new THREE.Mesh(new THREE.CylinderGeometry(5.5, 5.5, 55, 8), neonMat); body.rotateX(Math.PI/2); group.add(body);
            const tip = new THREE.Mesh(new THREE.ConeGeometry(5.5, 15, 8), new THREE.MeshBasicMaterial({ color: 0xffffff })); tip.rotateX(Math.PI/2); tip.position.z = -35; group.add(tip);

            group.position.copy(origin.position); group.quaternion.copy(origin.quaternion); group.translateZ(-60);

            const targeted = isPlayerOwned ? checkLockOnAvailable(boss || rival) : (origin.position.distanceTo(flightRig.position) < 1800);
            group.userData = { type: 'normal', isGuided: targeted, playerOwned: isPlayerOwned };

            scene.add(group); missiles.push(group);
            
            if(isPlayerOwned) {
                applyHitShake(2.5, 0.85);
                const overlay = document.getElementById('missile-cooldown'); const txt = document.getElementById('missile-timer');
                let rem = MISSILE_TIME; txt.innerText = Math.ceil(rem); overlay.style.height = "100%";
                const inv = setInterval(() => {
                    rem -= 0.1;
                    if(rem <= 0) { clearInterval(inv); missileCooldown = false; txt.innerText = ""; overlay.style.height = "0%"; } 
                    else { overlay.style.height = (rem / MISSILE_TIME) * 100 + "%"; txt.innerText = Math.ceil(rem); }
                }, 100);
            }
        }

        function fireHyperGun(isPlayerOwned) {
            const origin = isPlayerOwned ? flightRig : rival; if(!origin) return;
            const group = new THREE.Group();
            const coreColor = isPlayerOwned ? 0xffaa00 : 0x00ffcc; 
            const core = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 0.8, 25), new THREE.MeshBasicMaterial({ color: coreColor })); core.rotateX(Math.PI/2); group.add(core);

            group.position.copy(origin.position); group.quaternion.copy(origin.quaternion);
            
            let sideOffset = isPlayerOwned ? (playerGunSideToggle ? -32 : 32) : (rivalGunSideToggle ? -12 : 12);
            if(isPlayerOwned) playerGunSideToggle = !playerGunSideToggle; else rivalGunSideToggle = !rivalGunSideToggle;

            group.translateX(sideOffset); group.translateY(32); group.translateZ(82); 
            group.userData = { playerOwned: isPlayerOwned };
            scene.add(group); bullets.push(group);
            if(isPlayerOwned) applyHitShake(0.35, 0.65);
        }

        function fireTacticalNuke(isPlayerOwned) {
            if(isPlayerOwned && nukeCooldown) return; 
            const origin = isPlayerOwned ? flightRig : rival; if(!origin) return;
            if(isPlayerOwned) nukeCooldown = true;

            const nuke = new THREE.Group();
            const nukeMat = new THREE.MeshBasicMaterial({ color: isPlayerOwned ? 0xea580c : 0x7c3aed }); 
            const core = new THREE.Mesh(new THREE.SphereGeometry(22, 16, 16), nukeMat); core.scale.set(1, 2.2, 1); core.rotateX(Math.PI/2); nuke.add(core);

            nuke.position.copy(origin.position); nuke.quaternion.copy(origin.quaternion); nuke.translateZ(-100);

            const targeted = isPlayerOwned ? checkLockOnAvailable(boss || rival) : true;
            nuke.userData = { type: 'nuclear', isGuided: targeted, playerOwned: isPlayerOwned };

            scene.add(nuke); missiles.push(nuke);

            if(isPlayerOwned) {
                const overlay = document.getElementById('nuke-cooldown'); const txt = document.getElementById('nuke-timer');
                let rem = NUKE_TIME; txt.innerText = Math.ceil(rem); overlay.style.height = "100%";
                const inv = setInterval(() => {
                    rem -= 0.1; 
                    if(rem <= 0) { clearInterval(inv); nukeCooldown = false; txt.innerText = ""; overlay.style.height = "0%"; } 
                    else { overlay.style.height = (rem / NUKE_TIME) * 100 + "%"; txt.innerText = Math.ceil(rem); }
                }, 100);
            }
        }

        function spawnBossRoseBullet(pos, dir, isMissile = false) {
            let p;
            if(isMissile) {
                p = new THREE.Group();
                const mCore = new THREE.Mesh(new THREE.ConeGeometry(9, 35, 8), new THREE.MeshBasicMaterial({ color: 0xdc2626 })); mCore.rotateX(Math.PI/2); p.add(mCore);
                const mGlow = new THREE.Mesh(new THREE.SphereGeometry(12, 8, 8), new THREE.MeshBasicMaterial({ color: 0xff00ff })); mGlow.position.z = 18; p.add(mGlow);
                p.position.copy(pos); p.userData = { type: 'rose_missile', dir: dir, speed: 4.8, hp: 1 }; 
            } else {
                p = new THREE.Mesh(new THREE.SphereGeometry(8, 8, 8), new THREE.MeshBasicMaterial({ color: 0xf43f5e })); p.position.copy(pos);
                p.userData = { type: 'rose_petal', dir: dir, speed: 5.2 };
            }
            scene.add(p); bossProjectiles.push(p);
        }

        function applyHitShake(intensity, decayRate) { shakeIntensity = intensity; shakeDecay = decayRate; }

        function triggerExplosion(pos, type, isPlayerOwned) {
            const pColor = isPlayerOwned ? 0xea580c : 0x7c3aed;
            if(type === 'nuclear') {
                const flash = document.getElementById('flash-bang'); flash.style.opacity = "0.9"; setTimeout(() => { flash.style.opacity = "0"; }, 400);
                for(let i=0; i<400; i++) {
                    const p = new THREE.Mesh(new THREE.SphereGeometry(8 + Math.random()*15, 6, 6), new THREE.MeshBasicMaterial({color: pColor, transparent:true}));
                    p.position.copy(pos).add(new THREE.Vector3((Math.random()-0.5)*150, (Math.random()-0.5)*150, (Math.random()-0.5)*150));
                    p.userData = { vel: new THREE.Vector3((Math.random()-0.5)*24, (Math.random()-0.5)*24, (Math.random()-0.5)*24), life: 2.0, decay: 0.008 };
                    particles.push(p); scene.add(p);
                }
                applyHitShake(55.0, 0.95); 
            } else {
                for(let i=0; i<60; i++) {
                    const p = new THREE.Mesh(new THREE.SphereGeometry(3 + Math.random()*6, 4, 4), new THREE.MeshBasicMaterial({color: isPlayerOwned ? 0xff0044 : 0xffff00, transparent:true}));
                    p.position.copy(pos);
                    p.userData = { vel: new THREE.Vector3((Math.random()-0.5)*12, (Math.random()-0.5)*12, (Math.random()-0.5)*12), life: 1.2, decay: 0.025 };
                    particles.push(p); scene.add(p);
                }
                applyHitShake(13.0, 0.86); 
            }
        }

        flightRig.position.set(0, 300, 900);

        // --- 6. 메인 애니메이션 루프 ---
        function animate() {
            requestAnimationFrame(animate);

            const activeTarget = boss || rival;

            // 레이더 화살표 가변 색상 연산 로직
            if (activeTarget) {
                radarArrowGroup.visible = true;
                radarArrowGroup.lookAt(activeTarget.position);
                
                const currentDist = Math.floor(flightRig.position.distanceTo(activeTarget.position));
                const lockOnHud = document.getElementById('lockon-hud');
                const isLookingAt = checkLockOnAvailable(activeTarget);

                if(isLookingAt) {
                    arrowMat.color.setHex(0xff0044); 
                    lockOnHud.innerHTML = `▶ LOCK-ON TARGET ACQUIRED ◀<br><span style="color:#fff; font-size:11px;">TARGET DIST: ${currentDist}m</span>`; 
                    lockOnHud.style.color = "#dc2626";
                } else if(currentDist < 1200) {
                    arrowMat.color.setHex(0xea580c); 
                    lockOnHud.innerHTML = `⚠️ 조준선을 가시권 목표로 정렬하십시오 ⚠️<br><span style="color:#b91c1c; font-size:11px;">목표 거리: ${currentDist}m</span>`;
                    lockOnHud.style.color = "#1e3a8a";
                } else {
                    arrowMat.color.setHex(0xfacc15); 
                    lockOnHud.innerHTML = `⚠️ 레이더 화살표 추적 지향 중 ⚠️<br><span style="color:#4b5563; font-size:11px;">목표 거리: ${currentDist}m</span>`;
                    lockOnHud.style.color = "#4b5563";
                }
            } else {
                radarArrowGroup.visible = false;
                document.getElementById('lockon-hud').innerText = "MISSION COMPLETED";
            }

            const localAimTarget = new THREE.Vector3(mouseNDC_X * 240, mouseNDC_Y * 180, -400);
            const worldAimTarget = localAimTarget.clone().applyMatrix4(flightRig.matrixWorld);
            mouseTargetVisual.position.copy(worldAimTarget);

            const targetRotation = new THREE.Matrix4().lookAt(flightRig.position, worldAimTarget, new THREE.Vector3(0, 1, 0));
            const targetQuaternion = new THREE.Quaternion().setFromRotationMatrix(targetRotation);
            flightRig.quaternion.slerp(targetQuaternion, 0.070);

            const rollFactor = -mouseNDC_X * 0.6; flightRig.rotateZ(rollFactor * 0.1); 

            if(keys.shift && boostEnergy > 0) {
                speed = BOOST_SPEED; boostEnergy -= 0.03;
                document.getElementById('speed-tunnel').style.boxShadow = "inset 0 0 150px rgba(255, 255, 255, 0.8)";
                document.getElementById('hud-thr').innerText = "WEP";
            } else {
                speed = BASE_SPEED; document.getElementById('speed-tunnel').style.boxShadow = "none";
                if(boostEnergy < maxBoost) boostEnergy += 0.015;
                document.getElementById('hud-thr').innerText = "100";
            }
            document.getElementById('hud-spd').innerText = Math.floor(speed * 180);
            document.getElementById('boost-bar-inner').style.width = (boostEnergy / maxBoost) * 100 + "%";

            if(keys.clickHold) fireHyperGun(true);
            flightRig.translateZ(-speed);

            // 거대 장미 보스 무빙 및 반대 방향 밀어내기 거리 확보 루프
            if(boss) {
                boss.userData.patternTimer += 0.016;
                boss.userData.actionTimer += 1;

                const pattern = boss.userData.currentPattern;
                const actCount = boss.userData.actionTimer;
                const pText = document.getElementById('boss-pattern-text');

                if(boss.userData.patternTimer > 5.0) {
                    boss.userData.patternTimer = 0;
                    boss.userData.currentPattern = Math.floor(Math.random() * 4);
                    boss.userData.actionTimer = 0;
                    
                    if(boss.userData.currentPattern === 1) {
                        const toPlayer = new THREE.Vector3().subVectors(flightRig.position, boss.position).normalize();
                        boss.userData.dashVelocity.copy(toPlayer).multiplyScalar(18.0); 
                    }
                }

                if(pattern !== 1) {
                    const timeSeed = actCount * 0.035; 
                    const targetX = Math.sin(timeSeed) * 14.0 + Math.cos(timeSeed * 0.5) * 5.0;
                    const targetY = Math.cos(timeSeed * 0.7) * 7.0 + Math.sin(timeSeed * 1.3) * 3.0;
                    const targetZ = Math.sin(timeSeed * 0.4) * 8.0;

                    boss.userData.velocity.x = THREE.MathUtils.lerp(boss.userData.velocity.x, targetX, 0.05);
                    boss.userData.velocity.y = THREE.MathUtils.lerp(boss.userData.velocity.y, targetY, 0.05);
                    boss.userData.velocity.z = THREE.MathUtils.lerp(boss.userData.velocity.z, targetZ, 0.05);
                    boss.position.add(boss.userData.velocity);
                } else {
                    boss.position.add(boss.userData.dashVelocity);
                }

                const distToPlayer = boss.position.distanceTo(flightRig.position);
                if (distToPlayer < 550) {
                    const escapeDir = new THREE.Vector3().subVectors(boss.position, flightRig.position).normalize();
                    const pushForce = (550 - distToPlayer) * 0.08; 
                    boss.position.addScaledVector(escapeDir, pushForce);
                    if(pattern === 1) {
                        boss.userData.dashVelocity.multiplyScalar(0.8);
                    }
                }

                if(pattern === 0) {
                    pText.innerText = "⚠️ 보스 패턴: 360도 전방위 초거대 장미 파편 분산!";
                    boss.rotateY(0.025); 
                    if(actCount % 14 === 0) {
                        for(let angle = 0; angle < Math.PI * 2; angle += Math.PI / 8) {
                            let dir = new THREE.Vector3(Math.cos(angle), (Math.random()-0.5)*0.4, Math.sin(angle)).normalize();
                            spawnBossRoseBullet(boss.position, dir, false);
                        }
                    }
                }
                else if(pattern === 1) {
                    pText.innerText = "🚨 보스 패턴: 요새 본체 정면 차단 기동 돌격!";
                    if(distToPlayer < 380) {
                        playerHp -= 1500; applyHitShake(10.0, 0.92); // 보스 몸빵 대미지 상향 조정
                    }
                }
                else if(pattern === 2) {
                    pText.innerText = "⚠️ 보스 패턴: 전방 가시성 부채꼴 대량 화망 전개";
                    if(actCount % 9 === 0) {
                        const toPlayerDir = new THREE.Vector3().subVectors(flightRig.position, boss.position).normalize();
                        for(let offset = -0.5; offset <= 0.5; offset += 0.12) {
                            let sideDir = toPlayerDir.clone().applyAxisAngle(new THREE.Vector3(0,1,0), offset).normalize();
                            spawnBossRoseBullet(boss.position, sideDir, false);
                        }
                    }
                }
                else if(pattern === 3) {
                    pText.innerText = "🚀 보스 패턴: 격추 가능한 요격 유도 장미 미사일 개방!";
                    if(actCount % 38 === 0) {
                        const toPlayerDir = new THREE.Vector3().subVectors(flightRig.position, boss.position).normalize();
                        spawnBossRoseBullet(boss.position, toPlayerDir, true); 
                    }
                }
            }

            // 라이벌 AI 처리 및 거리 이탈 연산
            if(rival) {
                const now = performance.now(); 
                const distToPlayer = rival.position.distanceTo(flightRig.position);
                
                const rivalTargetRotation = new THREE.Matrix4().lookAt(rival.position, flightRig.position, new THREE.Vector3(0,1,0));
                const rivalTargetQuat = new THREE.Quaternion().setFromRotationMatrix(rivalTargetRotation);
                rival.quaternion.slerp(rivalTargetQuat, 0.070); 
                
                rival.translateZ(-2.1); 

                if(distToPlayer < 250) {
                    const rivalEscapeDir = new THREE.Vector3().subVectors(rival.position, flightRig.position).normalize();
                    rival.position.addScaledVector(rivalEscapeDir, 5.0);
                }

                if(distToPlayer < 1400 && now - rival.userData.lastGun > 80) { rival.userData.lastGun = now; fireHyperGun(false); }
                if(distToPlayer < 2000 && now - rival.userData.lastMissile > 4000) { rival.userData.lastMissile = now; fireHyperMissile(false); }
            }

            // 보스 투사체 충돌/격추 관리
            const mask = document.getElementById('damage-mask');
            for(let i = bossProjectiles.length - 1; i >= 0; i--) {
                const bp = bossProjectiles[i];
                if(bp.userData.type === 'rose_missile') {
                    const pDir = new THREE.Vector3().subVectors(flightRig.position, bp.position).normalize();
                    bp.userData.dir.lerp(pDir, 0.04).normalize(); bp.lookAt(bp.position.clone().add(bp.userData.dir));
                }
                bp.position.add(bp.userData.dir.clone().multiplyScalar(bp.userData.speed));

                if(bp.position.distanceTo(flightRig.position) < 25) {
                    // 유도미사일 2500, 일반탄막 400으로 데미지 대폭 상향 균형 보정
                    playerHp -= (bp.userData.type === 'rose_missile') ? 2500 : 400; applyHitShake(4.0, 0.85);
                    mask.style.opacity = "0.5"; setTimeout(() => { mask.style.opacity = "0"; }, 80);
                    scene.remove(bp); bossProjectiles.splice(i, 1); continue;
                }
                if(bp.position.distanceTo(flightRig.position) > 4000) { scene.remove(bp); bossProjectiles.splice(i, 1); }
            }

            // 기관포 탄환 연산 및 피격 판정
            for(let i=bullets.length-1; i>=0; i--) {
                const b = bullets[i]; b.translateZ(-45); const isPlayer = b.userData.playerOwned;

                if(isPlayer) {
                    if(boss && b.position.distanceTo(boss.position) < 350) { boss.userData.hp -= 3; scene.remove(b); bullets.splice(i,1); continue; }
                    if(rival && b.position.distanceTo(rival.position) < 35) { rival.userData.hp -= 7.5; scene.remove(b); bullets.splice(i,1); continue; }
                } else {
                    if(b.position.distanceTo(flightRig.position) < 15) {
                        playerHp -= 300; // 적 기관포 한 방에 피 300 닳음 (체감 강화)
                        applyHitShake(1.5, 0.85);
                        mask.style.opacity = "0.6"; setTimeout(() => { mask.style.opacity = "0"; }, 80);
                        scene.remove(b); bullets.splice(i,1); continue;
                    }
                }
                if(b.position.distanceTo(flightRig.position) > 3500) { scene.remove(b); bullets.splice(i,1); }
            }

            // 미사일 연산 및 피격 판정 루프
            for(let i=missiles.length-1; i>=0; i--) {
                const m = missiles[i]; const type = m.userData.type; const isGuided = m.userData.isGuided; const isPlayer = m.userData.playerOwned;
                const targetObj = isPlayer ? (boss || rival) : flightRig;

                if(targetObj && isGuided) {
                    const cDir = new THREE.Vector3(0,0,-1).applyQuaternion(m.quaternion);
                    const tDir = new THREE.Vector3().subVectors(targetObj.position, m.position).normalize();
                    cDir.lerp(tDir, 0.25).normalize(); m.lookAt(m.position.clone().add(cDir));
                }

                const trailGeo = new THREE.SphereGeometry(type==='nuclear'? 10.0 : 4.5, 5, 5);
                const trailMat = new THREE.MeshBasicMaterial({color: isPlayer ? (type==='nuclear'? 0xea580c : 0xff0044) : 0xffff00, transparent:true});
                const trail = new THREE.Mesh(trailGeo, trailMat); trail.position.copy(m.position);
                trail.userData = { vel: new THREE.Vector3((Math.random()-0.5)*0.5, (Math.random()-0.5)*0.5, (Math.random()-0.5)*0.5), life:0.6, decay:0.012 };
                particles.push(trail); scene.add(trail);

                if(isPlayer) {
                    if(boss && m.position.distanceTo(boss.position) < 360) {
                        boss.userData.hp -= (type === 'nuclear') ? 1600 : 700;
                        triggerExplosion(m.position, type, true); scene.remove(m); missiles.splice(i,1); continue;
                    }
                    if(rival && m.position.distanceTo(rival.position) < 45) {
                        rival.userData.hp -= (type === 'nuclear') ? 500 : 300; 
                        triggerExplosion(m.position, type, true); scene.remove(m); missiles.splice(i,1); continue;
                    }
                } else {
                    if(m.position.distanceTo(flightRig.position) < 25) {
                        // 적 미사일 대미지 상향: 전술핵 5,000 / 일반 미사일 2,500
                        playerHp -= (type === 'nuclear') ? 5000 : 2500; triggerExplosion(m.position, type, false); 
                        mask.style.opacity = "1"; setTimeout(() => { mask.style.opacity = "0"; }, 200);
                        scene.remove(m); missiles.splice(i,1); continue;
                    }
                }
                m.translateZ(type === 'nuclear' ? 40 : 75);
                if(m.position.distanceTo(flightRig.position) > 4500) { scene.remove(m); missiles.splice(i,1); }
            }

            // 플레이어 HP 안전 장치 마이너스 예방 처리
            if (playerHp < 0) playerHp = 0;

            // [핵심 반영] 실시간 디지털 수치 HUD 계산 및 DOM 업데이트
            const hpPercent = ((playerHp / playerMaxHp) * 100).toFixed(1);
            document.getElementById('player-hp-bar').style.width = hpPercent + "%";
            document.getElementById('player-hp-digital').innerText = `HP: ${Math.floor(playerHp)} / ${playerMaxHp} (${hpPercent}%)`;

            // 플레이어 사망 복구 기동 루프
            if(playerHp <= 0) { 
                if(isRivalPhase) {
                    playerHp = 10000; 
                    flightRig.position.set(0, 300, 900);
                } else {
                    playerHp = 100; flightRig.position.set(0, 300, 900); 
                }
            }

            // 보스 사망 연산
            if(boss) {
                const curHp = Math.max(0, boss.userData.hp);
                document.getElementById('boss-hp-text').innerText = `HP: ${curHp} / ${boss.userData.maxHp}`;
                document.getElementById('boss-hp-bar-inner').style.width = (curHp / boss.userData.maxHp) * 100 + "%";
                if(boss.userData.hp <= 0) {
                    triggerExplosion(boss.position, 'nuclear', true); scene.remove(boss); boss = null; spawnRivalAce(); 
                } else { boss.rotation.y += 0.003; }
            }

            // 라이벌 에이스 UI 및 무한 루프 스위치 관리
            if(rival) {
                const curHp = Math.max(0, rival.userData.hp);
                document.getElementById('boss-hp-text').innerText = `HP: ${curHp} / ${rival.userData.maxHp}`;
                document.getElementById('boss-hp-bar-inner').style.width = (curHp / rival.userData.maxHp) * 100 + "%";
                
                if(rival.userData.hp <= 0) {
                    triggerExplosion(rival.position, 'nuclear', true);
                    rival.userData.hp = 10000; 
                    rival.position.set((Math.random() - 0.5) * 800, 400, flightRig.position.z - 1200);
                }
            }

            // 파티클 소멸 처리
            for(let i=particles.length-1; i>=0; i--) {
                const p = particles[i]; p.position.add(p.userData.vel); p.userData.life -= p.userData.decay; p.material.opacity = p.userData.life;
                if(p.userData.life <= 0) { scene.remove(p); p.geometry.dispose(); p.material.dispose(); particles.splice(i,1); }
            }

            // 카메라 쉐이크
            shakeTimer += 0.7;
            if(shakeIntensity > 0.01) {
                camera.position.x = Math.sin(shakeTimer * 2.5) * shakeIntensity * 0.6;
                camera.position.y = Math.cos(shakeTimer * 2.1) * shakeIntensity * 0.6;
                camera.position.z = Math.sin(shakeTimer * 1.8) * shakeIntensity * 0.3;
                shakeIntensity *= shakeDecay;
            } else { camera.position.set(0,0,0); }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
